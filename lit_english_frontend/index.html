<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LIT English — Fale Inglês com Confiança</title>
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/landing.css" />
</head>
<body>

  <div class="landing">

    <!-- HEADER -->
    <header class="landing-header">
      <div class="logo">
        <svg class="logo-mark" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
          <rect x="6" y="6" width="88" height="50" rx="12" fill="none" stroke="#861E19" stroke-width="4"/>
          <text x="50" y="42" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="800" font-size="30" fill="#861E19">CC</text>
          <line x1="14" y1="50" x2="86" y2="12" stroke="#861E19" stroke-width="4" stroke-linecap="round"/>
        </svg>
        <div class="logo-word">LIT ENGLISH</div>
      </div>

      <nav class="landing-nav">
        <button type="button" class="landing-nav-link active" data-wip>Início</button>
        <button type="button" class="landing-nav-link" data-wip>Benefícios</button>
        <button type="button" class="landing-nav-link" data-wip>Como Funciona</button>
        <button type="button" class="landing-nav-link" data-wip>Entre em Contato</button>
      </nav>

      <div class="landing-header-actions">
        <button type="button" class="btn-outline-primary" data-wip>Teste de Inglês</button>
        <a href="login.html" class="btn-solid-primary">Acesse a Plataforma</a>
      </div>
    </header>

    <!-- HERO -->
    <section class="landing-hero">
      <div class="landing-hero-copy">
        <h1>Fale inglês<br />com confiança.</h1>
        <p>Método prático, aulas particulares e uma plataforma exclusiva para você aprender inglês de forma natural.</p>
        <button type="button" class="btn-solid-primary" data-wip>Comece Agora</button>
      </div>

      <div class="landing-hero-visual">
        <svg class="landing-dots" viewBox="0 0 700 560" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
          <defs>
            <pattern id="dotgrid" width="16" height="16" patternUnits="userSpaceOnUse">
              <circle cx="2" cy="2" r="2" fill="#861E19" />
            </pattern>
            <clipPath id="blobLeft">
              <path d="M -20 120 C 60 40, 160 30, 220 90 C 280 150, 260 220, 200 260 C 260 300, 300 360, 250 420 C 200 480, 90 470, 40 410 C -10 470, -90 440, -80 360 C -110 300, -80 230, -30 210 C -60 170, -60 140, -20 120 Z" />
            </clipPath>
            <clipPath id="blobRight">
              <path d="M 380 60 C 460 -10, 600 0, 660 70 C 720 140, 700 210, 640 240 C 700 270, 730 340, 680 400 C 630 460, 520 460, 470 410 C 440 470, 350 470, 320 410 C 260 400, 240 330, 290 280 C 250 240, 260 170, 320 140 C 300 90, 330 60, 380 60 Z" />
            </clipPath>
          </defs>
          <g opacity="0.35">
            <rect x="-100" y="0" width="400" height="500" fill="url(#dotgrid)" clip-path="url(#blobLeft)" />
            <rect x="240" y="-40" width="520" height="520" fill="url(#dotgrid)" clip-path="url(#blobRight)" />
          </g>
        </svg>

        <div class="landing-hero-badge">
          <svg class="logo-mark" viewBox="0 0 100 70" xmlns="http://www.w3.org/2000/svg">
            <rect x="6" y="6" width="88" height="50" rx="12" fill="none" stroke="#861E19" stroke-width="4"/>
            <text x="50" y="42" text-anchor="middle" font-family="Poppins, sans-serif" font-weight="800" font-size="30" fill="#861E19">CC</text>
            <line x1="14" y1="50" x2="86" y2="12" stroke="#861E19" stroke-width="4" stroke-linecap="round"/>
          </svg>
          <div class="logo-word">LIT ENGLISH</div>
          <div class="logo-rule"></div>
          <div class="logo-tagline">— Don't Get Lost In Translation —</div>
        </div>
      </div>
    </section>

  </div>

  <div class="wip-toast" id="wip-toast">🚧 Em construção — em breve por aqui!</div>

  <script>
    const toast = document.getElementById('wip-toast');
    let hideTimer;
    document.querySelectorAll('[data-wip]').forEach((el) => {
      el.addEventListener('click', () => {
        toast.classList.add('show');
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => toast.classList.remove('show'), 2200);
      });
    });
  </script>

</body>
</html>
